name: Aider

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Instruction for aider"
        required: true
        type: string
      base_branch:
        description: "Branch to modify"
        required: false
        default: "main"
        type: string
      model:
        description: "Aider model"
        required: false
        default: "openai/gpt-4.1"
        type: string
  issues:
    types:
      - labeled

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  NODE_VERSION: "20"

jobs:
  run-aider:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'aider') }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolve prompt
        id: prompt
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PROMPT: ${{ inputs.prompt }}
          INPUT_BASE_BRANCH: ${{ inputs.base_branch }}
          INPUT_MODEL: ${{ inputs.model }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            {
              echo "prompt<<EOF"
              echo "$INPUT_PROMPT"
              echo "EOF"
              echo "base_branch=${INPUT_BASE_BRANCH:-main}"
              echo "model=${INPUT_MODEL:-openai/gpt-4.1}"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "prompt<<EOF"
              echo "$ISSUE_TITLE"
              echo
              echo "$ISSUE_BODY"
              echo "EOF"
              echo "base_branch=main"
              echo "model=openai/gpt-4.1"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.prompt.outputs.base_branch }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create work branch
        id: branch
        shell: bash
        run: |
          branch="aider/${{ github.run_id }}-${{ github.run_attempt }}"
          git checkout -b "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install aider
        run: python -m pip install --upgrade aider-chat

      - name: Run aider
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AIDER_MODEL: ${{ steps.prompt.outputs.model }}
          AIDER_PROMPT: ${{ steps.prompt.outputs.prompt }}
        run: |
          aider \
            --model "$AIDER_MODEL" \
            --message "$AIDER_PROMPT" \
            --yes-always \
            --no-auto-commits

      - name: Lint and test
        run: |
          npm run lint
          npm test

      - name: Commit changes
        id: commit
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add -A
          git commit -m "Apply aider changes"
          git push origin "${{ steps.branch.outputs.branch }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: ${{ steps.commit.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base "${{ steps.prompt.outputs.base_branch }}" \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "Aider: automated changes" \
            --body "Generated by the Aider GitHub workflow. Review before merging."

      - name: Comment when no changes
        if: ${{ github.event_name == 'issues' && steps.commit.outputs.changed == 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "Aider ran, but produced no changes."
